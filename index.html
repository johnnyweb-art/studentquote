<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>ClassPulse 課堂脈動 — 課堂互動系統</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#0f1226; --panel:#1a1f3d; --panel2:#232a52; --ink:#eef1ff; --muted:#9aa3cf;
    --brand:#5b8cff; --brand2:#7b5bff; --ok:#34d399; --warn:#fbbf24; --bad:#fb7185;
    --line:#2e3666; --radius:16px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Noto Sans TC","Segoe UI",system-ui,-apple-system,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%,#26306b 0%,transparent 60%),var(--bg);
    color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
  a{color:var(--brand)}
  .wrap{max-width:980px;margin:0 auto;padding:18px}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;letter-spacing:.5px}
  .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--brand2));
    display:grid;place-items:center;font-size:18px}
  .pill{font-size:12px;color:var(--muted);border:1px solid var(--line);padding:4px 10px;border-radius:999px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .card h2{margin:0 0 12px;font-size:17px}
  .card h3{margin:0 0 8px;font-size:14px;color:var(--muted);font-weight:600}
  label{display:block;font-size:13px;color:var(--muted);margin:10px 0 6px}
  input,textarea,select{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--line);
    background:var(--panel2);color:var(--ink);font-size:15px;outline:none;font-family:inherit}
  input:focus,textarea:focus{border-color:var(--brand)}
  textarea{min-height:80px;resize:vertical}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row>*{flex:1;min-width:120px}
  button{cursor:pointer;border:none;border-radius:12px;padding:12px 16px;font-size:15px;font-weight:700;
    color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand2));transition:.15s;width:100%}
  button:hover{filter:brightness(1.08)}
  button:active{transform:translateY(1px)}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
  button.warn{background:linear-gradient(135deg,#f59e0b,#ef4444)}
  button.ok{background:linear-gradient(135deg,#10b981,#059669)}
  button.sm{padding:8px 12px;font-size:13px;width:auto}
  button:disabled{opacity:.5;cursor:not-allowed}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:760px){.grid2{grid-template-columns:1fr}}
  .qrbox{background:#fff;padding:16px;border-radius:14px;display:inline-block}
  .big{font-size:42px;font-weight:900;letter-spacing:2px;text-align:center;color:var(--brand)}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  .timer{font-size:64px;font-weight:900;text-align:center;line-height:1.1}
  .timer.run{color:var(--ok)} .timer.low{color:var(--warn)} .timer.end{color:var(--bad)}
  @keyframes flash{0%,100%{opacity:1}50%{opacity:.35}}
  .timer.low{animation:flash .6s infinite}
  .bar{height:10px;background:var(--panel2);border-radius:999px;overflow:hidden;margin-top:8px}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));transition:width .9s linear}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:9px 10px;border-bottom:1px solid var(--line);text-align:left}
  th{color:var(--muted);font-weight:600;font-size:12px}
  .chip{display:inline-block;font-size:12px;padding:3px 9px;border-radius:999px;border:1px solid var(--line)}
  .chip.ok{color:var(--ok);border-color:#1f6b53} .chip.no{color:var(--muted)}
  .chip.late{color:var(--warn);border-color:#5b4a2e}
  .chip.grp{color:var(--brand);border-color:#2e3f7e}
  .stu-grid{display:flex;flex-wrap:wrap;gap:8px}
  .stu{padding:8px 12px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);font-size:14px;
    display:flex;align-items:center;gap:8px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--ok)}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--panel2);
    border:1px solid var(--line);padding:12px 18px;border-radius:12px;font-size:14px;opacity:0;transition:.3s;z-index:50}
  .toast.show{opacity:1}
  .hide{display:none!important}
  .kpi{display:flex;gap:12px;flex-wrap:wrap}
  .kpi .box{flex:1;min-width:110px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
  .kpi .n{font-size:28px;font-weight:900;color:var(--brand)}
  .kpi .l{font-size:12px;color:var(--muted);margin-top:4px}
  .banner{background:#2a2140;border:1px solid #5b4a2e;color:#fbbf24;padding:10px 14px;border-radius:12px;font-size:13px;margin-bottom:14px}
  .seg{display:flex;gap:6px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:4px;flex-wrap:wrap}
  .seg button{flex:1;background:transparent;color:var(--muted);font-size:13px;padding:8px;min-width:84px}
  .seg button.active{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}
  .answer-card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px}
  .answer-card .who{font-weight:700;font-size:13px}
  .answer-card .txt{margin-top:4px;font-size:15px}
  .answer-card .meta{font-size:11px;color:var(--muted);margin-top:4px}
  /* 長條圖 */
  .vbar{display:flex;align-items:center;gap:10px;margin:6px 0}
  .vbar .lab{width:42px;font-weight:800;color:var(--brand)}
  .vbar .track{flex:1;height:22px;background:var(--panel2);border-radius:8px;overflow:hidden}
  .vbar .fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));border-radius:8px;transition:width .5s}
  .vbar .cnt{width:64px;text-align:right;color:var(--muted);font-size:13px}
  /* 文字雲 */
  .cloud{display:flex;flex-wrap:wrap;gap:8px 14px;align-items:baseline;padding:6px 0}
  .cloud span{line-height:1.1;color:var(--ink)}
  /* 理解度儀表 */
  .pulse{display:flex;gap:12px}
  .pulse .seg2{flex:1;border-radius:12px;border:1px solid var(--line);padding:12px;text-align:center;background:var(--panel2)}
  .pulse .seg2.ok{border-color:#1f6b53} .pulse .seg2.lost{border-color:#5b4a2e}
  .pulse .big2{font-size:26px;font-weight:900}
  .pbtns{display:flex;gap:10px}
  .pbtns button{font-size:16px}
  .pbtns .lost{background:linear-gradient(135deg,#f59e0b,#ef4444)}
  .pbtns .selected{outline:3px solid #fff;outline-offset:2px}
  details{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:12px}
  summary{cursor:pointer;font-weight:700;font-size:14px}
  .heat{font-weight:800}
  .heat.lo{color:var(--bad)} .heat.mid{color:var(--warn)} .heat.hi{color:var(--ok)}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   ClassPulse 課堂脈動  v2
   單檔課堂互動系統
   QR 簽到（名單驗證／時間窗／防代簽 PIN）｜限時搶答（可修改）
   即時圖表・文字雲｜理解度回饋｜出場券｜題庫｜小組競賽｜跨週儀表
   為 Johnny 教授 1151 管理學課程客製
   ============================================================ */

/* ---------- 1. Firebase 設定 ---------- */
const firebaseConfig = {
  apiKey: "AIzaSyB9gbpyyxkHsjcd2TH1Vc2qO5AxTJfawbE",
  authDomain: "classpulse-77f5b.firebaseapp.com",
  databaseURL: "https://classpulse-77f5b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "classpulse-77f5b",
  storageBucket: "classpulse-77f5b.firebasestorage.app",
  messagingSenderId: "386329847096",
  appId: "1:386329847096:web:3f04c4c101f48df2fb4dcd"
};
const USE_FIREBASE = !firebaseConfig.apiKey.startsWith("PASTE_");

/* ---------- 2. 資料層抽象 (DB) ---------- */
const DB = (function(){
  if(USE_FIREBASE){
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    return {
      mode:"firebase",
      set:(p,v)=>db.ref(p).set(v),
      update:(p,v)=>db.ref(p).update(v),
      push:(p,v)=>{const r=db.ref(p).push();return r.set(v).then(()=>r.key);},
      get:(p)=>db.ref(p).get().then(s=>s.val()),
      onValue:(p,cb)=>{const ref=db.ref(p);const h=ref.on('value',s=>cb(s.val()));return ()=>ref.off('value',h);}
    };
  }
  const KEY="classpulse_local";
  const ch = ("BroadcastChannel" in window) ? new BroadcastChannel("classpulse") : null;
  const subs=[];
  function read(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return {}}}
  function write(o){localStorage.setItem(KEY,JSON.stringify(o));if(ch)ch.postMessage(Date.now());notify();}
  function getPath(o,p){return p.split('/').filter(Boolean).reduce((a,k)=>(a==null?undefined:a[k]),o);}
  function setPath(o,p,v){const ks=p.split('/').filter(Boolean);let a=o;
    for(let i=0;i<ks.length-1;i++){if(typeof a[ks[i]]!=='object'||a[ks[i]]==null)a[ks[i]]={};a=a[ks[i]];}
    if(v===null)delete a[ks[ks.length-1]];else a[ks[ks.length-1]]=v;return o;}
  function notify(){const o=read();subs.forEach(s=>{try{s.cb(getPath(o,s.path)??null)}catch(e){}});}
  if(ch)ch.onmessage=()=>notify();
  window.addEventListener('storage',e=>{if(e.key===KEY)notify();});
  setInterval(notify,1200);
  return {
    mode:"local",
    set:(p,v)=>{const o=read();setPath(o,p,v);write(o);return Promise.resolve();},
    update:(p,v)=>{const o=read();Object.keys(v).forEach(k=>setPath(o,p+'/'+k,v[k]));write(o);return Promise.resolve();},
    push:(p,v)=>{const id='k'+Date.now()+Math.floor(Math.random()*1000);const o=read();setPath(o,p+'/'+id,v);write(o);return Promise.resolve(id);},
    get:(p)=>Promise.resolve(getPath(read(),p)??null),
    onValue:(p,cb)=>{const s={path:p,cb};subs.push(s);cb(getPath(read(),p)??null);return ()=>{const i=subs.indexOf(s);if(i>=0)subs.splice(i,1);};}
  };
})();

/* ---------- 3. 工具函式 ---------- */
const $=(s,r=document)=>r.querySelector(s);
const el=(t,a={},...kids)=>{const e=document.createElement(t);
  for(const k in a){const v=a[k];if(v==null||v===false)continue;
  if(k==='class')e.className=v;else if(k==='html')e.innerHTML=v;
  else if(k.startsWith('on'))e.addEventListener(k.slice(2),v);else e.setAttribute(k,v);}
  kids.flat().forEach(c=>e.appendChild(typeof c==='string'?document.createTextNode(c):c));return e;};
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function now(){return Date.now();}
function qparam(k){return new URLSearchParams(location.search).get(k);}
function randCode(){return Math.random().toString(36).slice(2,7).toUpperCase();}
function fmtTime(ts){const d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

/* 計分規則（可調整）*/
const PTS={checkin:1, answer:2, intime:1, exit:1};

/* 防代簽 PIN：依時間區間(20秒)與課堂代碼計算，師生兩端同步 */
function pinSlot(){return Math.floor(now()/20000);}
function pinFor(code,slot){let h=0;const s=code+'|'+slot;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0;}return (h%10000).toString().padStart(4,'0');}
function pinValid(code,input){const sl=pinSlot();return input===pinFor(code,sl)||input===pinFor(code,sl-1);}

/* 音效（倒數嗶聲）*/
let _ac=null;
function muted(){return localStorage.getItem('cp_mute')==='1';}
function beep(freq,dur){if(muted())return;try{_ac=_ac||new (window.AudioContext||window.webkitAudioContext)();
  const o=_ac.createOscillator(),g=_ac.createGain();o.frequency.value=freq||880;o.connect(g);g.connect(_ac.destination);
  g.gain.setValueAtTime(0.0001,_ac.currentTime);g.gain.exponentialRampToValueAtTime(0.18,_ac.currentTime+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,_ac.currentTime+(dur||0.12));o.start();o.stop(_ac.currentTime+(dur||0.12));}catch(e){}}

/* 中文/英數斷詞 → 詞頻（給文字雲）*/
const STOP=new Set(('的 是 了 和 與 在 我 你 他 她 它 們 也 都 就 而 以 為 對 或 一 這 那 有 不 很 要 把 被 給 到 從 並 之 等 會 能 可 但 然 後 因 所 如 中 上 下 個 我們 你們 他們 一個 可以 因為 所以 而且 以及 還有 一種 一門 旨在').split(/\s+/));
function tokenize(str){
  const cleaned=(str||'').replace(/[，。、！？；：「」『』（）()\[\]【】《》〈〉～·\s,.!?;:'"#@\/\\\-_=+*0-9]/g,' ');
  const parts=cleaned.split(/\s+/).filter(Boolean);
  const toks=[];
  parts.forEach(p=>{
    if(/^[a-zA-Z]+$/.test(p)){ if(p.length>=2)toks.push(p.toLowerCase()); return; }
    const chars=[...p];
    if(chars.length===1){ if(!STOP.has(chars[0]))toks.push(chars[0]); return; }
    for(let i=0;i<chars.length-1;i++){const bg=chars[i]+chars[i+1];
      if(!STOP.has(chars[i])&&!STOP.has(chars[i+1])&&!STOP.has(bg))toks.push(bg);}
  });
  return toks;
}
function freqTop(texts,n){const m={};texts.forEach(t=>tokenize(t).forEach(w=>m[w]=(m[w]||0)+1));
  return Object.entries(m).filter(([w,c])=>c>=1).sort((a,b)=>b[1]-a[1]).slice(0,n||30);}

/* ---------- 4. 路由 ---------- */
const sid = qparam('s');
if(sid){ studentApp(sid); } else { teacherApp(); }

function header(sub){
  return el('div',{class:'topbar'},
    el('div',{class:'brand'}, el('div',{class:'logo'},'⚡'), 'ClassPulse', el('span',{class:'muted small',style:'font-weight:400'},'課堂脈動')),
    el('span',{class:'pill'}, sub + (DB.mode==='local'?' · 本機示範':' · 即時連線'))
  );
}

/* ============================================================
   教師端
   ============================================================ */
function teacherApp(){
  const app=$('#app');
  let session = localStorage.getItem('cp_teacher_session');
  app.innerHTML='';
  app.appendChild(header('教師端'));
  if(DB.mode==='local'){
    app.appendChild(el('div',{class:'banner'},
      '目前為本機示範模式（尚未設定 Firebase）。正式跨裝置請依指南填入 Firebase 設定。'));
  }
  if(!session){ renderCreate(app); } else { renderConsole(app, session); }
}

function renderCreate(app){
  const card=el('div',{class:'card'},
    el('h2',{},'開始一堂新課'),
    el('label',{},'課程名稱'),
    el('input',{id:'c_course',placeholder:'例：管理學 (一)',value:'管理學'}),
    el('label',{},'第幾週 / 節次'),
    el('input',{id:'c_week',type:'number',value:'1',min:'1'}),
    el('div',{style:'height:6px'}),
    el('details',{},
      el('summary',{},'進階（選用）：學生名單與分組'),
      el('div',{style:'height:8px'}),
      el('label',{},'班級名單（每行一位：學號,姓名 或 學號,姓名,組別）'),
      el('textarea',{id:'c_roster',placeholder:'1100001,王小明\n1100002,陳大華,A\n1100003,林美麗,B'}),
      el('div',{class:'row',style:'margin-top:8px;align-items:center'},
        el('label',{style:'margin:0;flex:2'},
          el('input',{id:'c_strict',type:'checkbox',style:'width:auto;margin-right:6px'}),'嚴格模式：僅名單內學號可簽到'),
        el('div',{style:'flex:1'}, el('label',{style:'margin:0'},'分組數（0=不分組）'),
          el('input',{id:'c_groups',type:'number',value:'0',min:'0',max:'12'}))
      )
    ),
    el('div',{style:'height:12px'}),
    el('button',{onclick:async()=>{
      const course=$('#c_course').value.trim()||'未命名課程';
      const week=$('#c_week').value||'1';
      const groups=parseInt($('#c_groups').value)||0;
      const strict=$('#c_strict').checked;
      const code=randCode();
      const meta={course,week,code,createdAt:now(),status:'open',checkin:'open',groups,rosterStrict:strict,pinOn:false};
      await DB.set('sessions/'+code+'/meta',meta);
      // 解析名單
      const lines=($('#c_roster').value||'').split(/\n+/).map(l=>l.trim()).filter(Boolean);
      if(lines.length){
        const roster={};
        lines.forEach(l=>{const p=l.split(/[,，\t ]+/).map(x=>x.trim()).filter(Boolean);
          if(p[0])roster[p[0]]={name:p[1]||p[0],group:p[2]||''};});
        await DB.set('sessions/'+code+'/roster',roster);
      }
      localStorage.setItem('cp_teacher_session',code);
      teacherApp();
    }},'建立課堂並產生簽到 QR')
  );
  app.appendChild(card);
}

function renderConsole(app, code){
  let meta=null, roster={}, attendance={}, questions={}, activeQ=null, pulse={}, view='live';
  const unsubs=[];

  const ctrl=el('div',{class:'card'},
    el('div',{class:'row'},
      el('div',{}, el('h2',{id:'h_title'},'載入中…'), el('div',{class:'muted small',id:'h_sub'},'')),
      el('div',{style:'flex:0 0 auto;display:flex;gap:8px'},
        el('button',{class:'ghost sm',onclick:()=>{
          if(confirm('結束本堂並回到首頁？資料仍保留在資料庫中。')){localStorage.removeItem('cp_teacher_session');teacherApp();}
        }},'結束本堂'),
        el('button',{class:'warn sm',onclick:async()=>{
          if(confirm('確定刪除本堂（'+code+'）的所有資料？此動作無法復原。')&&confirm('再次確認：將永久刪除本堂的簽到、作答與統計記錄。')){
            await DB.set('sessions/'+code,null);localStorage.removeItem('cp_teacher_session');toast('已刪除本堂資料');teacherApp();}
        }},'🗑 刪除本堂'))
    )
  );
  app.appendChild(ctrl);

  const seg=el('div',{class:'seg',style:'margin-bottom:16px'},
    el('button',{class:'active',id:'tab_live',onclick:()=>setView('live')},'即時互動'),
    el('button',{id:'tab_qr',onclick:()=>setView('qr')},'簽到 QR'),
    el('button',{id:'tab_stats',onclick:()=>setView('stats')},'統計報表'),
    el('button',{id:'tab_cross',onclick:()=>setView('cross')},'跨週儀表')
  );
  app.appendChild(seg);
  const body=el('div',{id:'t_body'});
  app.appendChild(body);

  function setView(v){view=v;
    ['live','qr','stats','cross'].forEach(x=>$('#tab_'+x).classList.toggle('active',x===v));
    body.__live=false; if(v==='cross')loadCross(); draw();}

  unsubs.push(DB.onValue('sessions/'+code+'/meta',v=>{meta=v;draw();}));
  unsubs.push(DB.onValue('sessions/'+code+'/roster',v=>{roster=v||{};draw();}));
  unsubs.push(DB.onValue('sessions/'+code+'/attendance',v=>{attendance=v||{};draw();}));
  unsubs.push(DB.onValue('sessions/'+code+'/questions',v=>{questions=v||{};draw();}));
  unsubs.push(DB.onValue('sessions/'+code+'/activeQuestion',v=>{activeQ=v;draw();}));
  unsubs.push(DB.onValue('sessions/'+code+'/pulse',v=>{pulse=v||{};draw();}));

  let lastBeep=-1;
  setInterval(()=>{if(view==='live')drawLive();
    // 防代簽 PIN 旋轉顯示
    if(view==='qr'&&meta&&meta.pinOn){const e=$('#pin_now');if(e)e.textContent=pinFor(code,pinSlot());}
  },250);

  function draw(){
    if(meta){$('#h_title').textContent=meta.course+'　第 '+meta.week+' 週';
      $('#h_sub').textContent='課堂代碼 '+code+(meta.groups?('　·　分 '+meta.groups+' 組'):'');}
    if(view==='live')drawLive();
    else if(view==='qr')drawQR();
    else if(view==='stats')drawStats();
    else drawCross();

      el('h2',{style:'margin:0'},'即時理解度'),

      el('div',{class:'seg2 ok'}, el('div',{class:'big2',style:'color:var(--ok)'}, String(ok)), el('div',{class:'muted small'},'👍 跟得上')),

    ));

  function renderViz(q,ansList){
    const wrap=el('div',{});
    if(q.type==='choice'){
      const counts={A:0,B:0,C:0,D:0};
      ansList.forEach(([id,a])=>{const v=(a.answer||'').trim().toUpperCase();if(counts[v]!=null)counts[v]++;});
      const max=Math.max(1,...Object.values(counts));
      ['A','B','C','D'].forEach(opt=>{
        wrap.appendChild(el('div',{class:'vbar'},
          el('div',{class:'lab'},opt),
          el('div',{class:'track'}, el('div',{class:'fill',style:'width:'+(counts[opt]/max*100)+'%'})),
          el('div',{class:'cnt'}, counts[opt]+' 人')));
      });
    } else if(q.type==='number'){
      const nums=ansList.map(([id,a])=>parseFloat(a.answer)).filter(n=>!isNaN(n));
      if(!nums.length){wrap.appendChild(el('div',{class:'muted'},'尚無數字作答'));return wrap;}
      const min=Math.min(...nums),max=Math.max(...nums),avg=nums.reduce((s,n)=>s+n,0)/nums.length;
      wrap.appendChild(el('div',{class:'kpi'},
        el('div',{class:'box'}, el('div',{class:'n'},avg.toFixed(1)), el('div',{class:'l'},'平均')),
        el('div',{class:'box'}, el('div',{class:'n'},String(min)), el('div',{class:'l'},'最小')),
        el('div',{class:'box'}, el('div',{class:'n'},String(max)), el('div',{class:'l'},'最大'))));
    } else {
      const texts=ansList.map(([id,a])=>a.answer||'');
      const top=freqTop(texts,30);
      if(!top.length){wrap.appendChild(el('div',{class:'muted'},'尚無文字作答（文字雲會在學生作答後出現）'));return wrap;}
      const maxc=top[0][1];
      const cloud=el('div',{class:'cloud'});
      top.forEach(([w,c])=>{const size=14+Math.round(c/maxc*26);
        const op=0.55+0.45*(c/maxc);
        cloud.appendChild(el('span',{style:'font-size:'+size+'px;font-weight:800;opacity:'+op.toFixed(2)},w));});
      wrap.appendChild(cloud);
      wrap.appendChild(el('div',{class:'muted small',style:'margin-top:6px'},'依關鍵詞出現頻率自動產生（中文採二字詞）。'));
    }
    return wrap;
  }

  async function startQuestion(_t){
    const text=$('#q_text').value.trim();
    const sec=parseInt($('#q_sec').value)||30;
    const type=$('#q_type').value;
    if(!text){toast('請先輸入問題內容');return;}
    if(!Object.keys(attendance).length && !confirm('目前沒有學生簽到，仍要開始嗎？')){return;}

    const q={text,type,seconds:sec,startAt:now(),endAt:now()+sec*1000,status:'live'};
    await DB.set('sessions/'+code+'/activeQuestion',q);
    $('#q_text').value='';

    await archiveActive();

    }
  }

  /* ---- 跨週儀表 ---- */
  let crossData=null;
  function loadCross(){crossData=null;DB.get('sessions').then(all=>{crossData=all||{};if(view==='cross')drawCross();});}
  function drawCross(){
    if(view!=='cross')return;
    body.innerHTML='';
    if(crossData===null){body.appendChild(el('div',{class:'card'},el('div',{class:'muted'},'載入中…')));return;}
    const course=meta?meta.course:'';
    const sessions=Object.entries(crossData).filter(([c,s])=>s&&s.meta&&s.meta.course===course)
      .sort((a,b)=>(parseInt(a[1].meta.week)||0)-(parseInt(b[1].meta.week)||0));
    const weeks=sessions.map(([c,s])=>s.meta.week);
    // 彙整每位學生
    const stu={};
    sessions.forEach(([c,s])=>{
      const w=s.meta.week;
      Object.entries(s.attendance||{}).forEach(([id,a])=>{
        if(!stu[id])stu[id]={id,name:a.name,weeks:{},checkins:0,answers:0,pts:0};
        stu[id].name=a.name;stu[id].weeks[w]=stu[id].weeks[w]||{checkin:false,ans:0};
        stu[id].weeks[w].checkin=true;stu[id].checkins++;stu[id].pts+=PTS.checkin;});
      const qs=Object.values(s.questions||{});
      if(s.activeQuestion)qs.push(s.activeQuestion);
      qs.forEach(q=>{if((q.kind||'q')==='exit')return;Object.entries(q.answers||{}).forEach(([id,a])=>{
        if(!stu[id])stu[id]={id,name:a.name,weeks:{},checkins:0,answers:0,pts:0};
        stu[id].weeks[w]=stu[id].weeks[w]||{checkin:false,ans:0};
        stu[id].weeks[w].ans++;stu[id].answers++;stu[id].pts+=PTS.answer;if(a.intime)stu[id].pts+=PTS.intime;});});
    });
    const list=Object.values(stu).sort((a,b)=>b.pts-a.pts);
    const totalWeeks=weeks.length;

    body.appendChild(el('div',{class:'card'},
      el('div',{class:'row',style:'align-items:center'},
        el('div',{}, el('h2',{style:'margin:0'},'跨週累計儀表　'+course),
          el('div',{class:'muted small'}, totalWeeks+' 週 · '+list.length+' 位學生')),
        el('div',{style:'flex:0 0 auto;display:flex;gap:8px;flex-wrap:wrap'},
          el('button',{class:'ghost sm',onclick:loadCross},'↻ 重新整理'),
          el('button',{class:'ghost sm',onclick:()=>exportCross(list,weeks,course)},'⬇ CSV'),
          el('button',{class:'warn sm',onclick:async()=>{
            if(confirm('⚠️ 清空資料庫中「所有課程、所有週次」的全部記錄？此動作無法復原，僅供測試後重置。')&&confirm('最後確認：真的要刪除全部課堂資料嗎？')){
              await DB.set('sessions',null);localStorage.removeItem('cp_teacher_session');toast('已清空所有資料');teacherApp();}
          }},'🗑 清空所有資料')))
    ));

    if(!sessions.length){body.appendChild(el('div',{class:'card'},el('div',{class:'muted'},'尚無同課程資料。')));return;}

    const t=el('table',{});
    const head=el('tr',{}, el('th',{},'學號'),el('th',{},'姓名'));
    weeks.forEach(w=>head.appendChild(el('th',{style:'text-align:center'},'W'+w)));
    head.appendChild(el('th',{},'簽到率'));head.appendChild(el('th',{},'總作答'));head.appendChild(el('th',{},'參與分'));
    t.appendChild(head);
    list.forEach(r=>{
      const tr=el('tr',{}, el('td',{},r.id),el('td',{},r.name));
      let present=0;
      weeks.forEach(w=>{const c=r.weeks[w]&&r.weeks[w].checkin;if(c)present++;
        tr.appendChild(el('td',{style:'text-align:center'}, c?el('span',{class:'chip ok'},(r.weeks[w].ans||0)>0?String(r.weeks[w].ans):'✓'):el('span',{class:'muted'},'·')));});
      const rate=totalWeeks?Math.round(present/totalWeeks*100):0;
      const hl=rate<50?'lo':(rate<80?'mid':'hi');
      tr.appendChild(el('td',{}, el('span',{class:'heat '+hl}, rate+'%')));
      tr.appendChild(el('td',{},String(r.answers)));
      tr.appendChild(el('td',{}, el('strong',{},String(r.pts))));
      t.appendChild(tr);
    });
    body.appendChild(el('div',{class:'card'}, el('h2',{},'參與矩陣（格內數字＝該週作答數）'),
      el('div',{class:'muted small',style:'margin-bottom:8px'},'簽到率紅色＝低於 50%，建議關懷。'),
      el('div',{style:'overflow-x:auto'}, t)));
  }
}

function exportCSV(list,totalQ,meta){
  let csv='﻿課程,'+(meta?meta.course:'')+',第'+(meta?meta.week:'')+'週\n';
  csv+='排名,學號,姓名,組別,簽到,作答題數,總題數,限時內,參與分\n';
  list.forEach((r,i)=>{csv+=[i+1,r.id,r.name,r.group||'',r.checkin?'是':'否',r.answers,totalQ,r.intime,r.pts].join(',')+'\n';});
  downloadCSV(csv,'ClassPulse_'+(meta?meta.course:'課堂')+'_第'+(meta?meta.week:'')+'週.csv');
}
function exportCross(list,weeks,course){
  let csv='﻿跨週累計,'+course+'\n學號,姓名';
  weeks.forEach(w=>csv+=',W'+w);
  csv+=',簽到週數,總作答,參與分\n';
  list.forEach(r=>{let present=0;let row=[r.id,r.name];
    weeks.forEach(w=>{const c=r.weeks[w]&&r.weeks[w].checkin;if(c)present++;row.push(c?(r.weeks[w].ans||'V'):'');});
    row.push(present,r.answers,r.pts);csv+=row.join(',')+'\n';});
  downloadCSV(csv,'ClassPulse_跨週_'+course+'.csv');
}
function downloadCSV(csv,name){const b=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();}

/* ============================================================
   學生端
   ============================================================ */
function studentApp(code){
  const app=$('#app');
  app.innerHTML='';
  app.appendChild(header('學生端'));
  let me=JSON.parse(localStorage.getItem('cp_student_'+code)||'null');

  Promise.all([DB.get('sessions/'+code+'/meta'),DB.get('sessions/'+code+'/roster')]).then(([meta,roster])=>{
    if(!meta){ notFound(); return; }
    roster=roster||{};
    if(!me){ renderCheckin(app,code,meta,roster); }
    else { renderStudent(app,code,meta,me); }
  }).catch(err=>notFound('讀取資料庫失敗：'+(err&&err.message||err)));

  function notFound(extra){
    const local=DB.mode==='local';
    app.appendChild(el('div',{class:'card'},
      el('h2',{}, local?'無法連線到課堂（尚未設定 Firebase）':'找不到課程資訊'),
      el('div',{class:'muted',style:'margin:8px 0'},
        local?'此網頁為本機示範模式，讀不到老師另一台裝置的課堂。請老師設定 Firebase 後重新上傳。'
             :('課堂代碼 '+code+' 不存在，或老師尚未開始這堂課。')),
      extra?el('div',{class:'banner',style:'text-align:left'},extra):el('span'),
      el('div',{style:'height:8px'}), el('button',{class:'ghost',onclick:()=>studentApp(code)},'重新整理再試')));
  }
}

function renderCheckin(app,code,meta,roster){
  const hasRoster=Object.keys(roster).length>0;
  const closed=meta.checkin==='closed';
  const card=el('div',{class:'card'},
    el('h2',{}, meta.course+'　第 '+meta.week+' 週'),
    el('div',{class:'muted small'}, closed?'⚠️ 老師已關閉簽到，請舉手向老師反映。':'請輸入學號完成簽到'),
    el('label',{},'學號'),
    el('input',{id:'s_id',placeholder:'例：1100001',inputmode:'numeric'}),
    el('label',{},'姓名'+(meta.rosterStrict?'（名單內將自動帶出）':'')),
    el('input',{id:'s_name',placeholder:'你的姓名'})
  );
  // 分組
  if(meta.groups){
    card.appendChild(el('label',{},'選擇組別'));
    const sel=el('select',{id:'s_group'});
    sel.appendChild(el('option',{value:''},'— 請選擇 —'));
    for(let i=1;i<=meta.groups;i++)sel.appendChild(el('option',{value:String(i)},'第 '+i+' 組'));
    card.appendChild(sel);
  }
  // 防代簽 PIN
  if(meta.pinOn){
    card.appendChild(el('label',{},'通關碼（看老師螢幕，4 位數）'));
    card.appendChild(el('input',{id:'s_pin',inputmode:'numeric',placeholder:'例：0427',maxlength:'4'}));
  }
  card.appendChild(el('div',{style:'height:14px'}));
  card.appendChild(el('button',{disabled:closed?'disabled':null,onclick:async()=>{
    const id=$('#s_id').value.trim();
    if(!id){toast('請輸入學號');return;}
    if(meta.rosterStrict && !roster[id]){toast('此學號不在名單內，請確認');return;}
    let name=$('#s_name').value.trim();
    if(roster[id]&&roster[id].name)name=roster[id].name;
    if(!name){toast('請輸入姓名');return;}
    if(meta.pinOn){const pin=($('#s_pin')?$('#s_pin').value.trim():'');if(!pinValid(code,pin)){toast('通關碼錯誤或已過期，請看螢幕重新輸入');return;}}
    let group=(roster[id]&&roster[id].group)||'';
    if(meta.groups && !group){group=$('#s_group')?$('#s_group').value:'';if(!group){toast('請選擇組別');return;}}
    const late = meta.checkinUntil && now()>meta.checkinUntil;
    const rec={name,ts:now()}; if(group)rec.group=group; if(late)rec.late=true;
    await DB.set('sessions/'+code+'/attendance/'+id,rec);
    localStorage.setItem('cp_student_'+code,JSON.stringify({id,name,group}));
    toast(late?'簽到成功（已逾時，標記遲到）':'簽到成功！');
    studentApp(code);
  }}, closed?'簽到已關閉':'✓ 簽到'));
  app.appendChild(card);
}

function renderStudent(app,code,meta,me){
  app.appendChild(el('div',{class:'card'},
    el('div',{class:'row',style:'align-items:center'},
      el('div',{}, el('h2',{style:'margin:0'},'已簽到 ✓'),
        el('div',{class:'muted small'}, me.name+' ('+me.id+')'+(me.group?'　·　第 '+me.group+' 組':'')+'　·　'+meta.course+' 第 '+meta.week+' 週')),
      el('div',{style:'flex:0 0 auto'}, el('div',{class:'chip ok',id:'my_pts'},'參與分 …')))));

  // 理解度回饋
  const pulseCard=el('div',{class:'card'},
    el('h3',{},'隨時讓老師知道你的狀態'),
    el('div',{class:'pbtns'},
      el('button',{class:'ok',id:'pb_ok',onclick:()=>setPulse('ok')},'👍 跟得上'),
      el('button',{class:'lost',id:'pb_lost',onclick:()=>setPulse('lost')},'🤔 還不懂')));
  app.appendChild(pulseCard);
  let myPulse=null;
  function setPulse(st){myPulse=st;DB.set('sessions/'+code+'/pulse/'+me.id,{state:st,ts:now()});
    $('#pb_ok').classList.toggle('selected',st==='ok');$('#pb_lost').classList.toggle('selected',st==='lost');}

  const qbox=el('div',{id:'s_qbox'});
  app.appendChild(qbox);

  let activeQ=null,lastQStart=null;
  DB.onValue('sessions/'+code+'/activeQuestion',v=>{activeQ=v;
    if(activeQ&&activeQ.startAt!==lastQStart){lastQStart=activeQ.startAt;}
    drawQ();});
  DB.onValue('sessions/'+code+'/questions',v=>updatePts(v||{}));
  setInterval(drawQ,250);

  function updatePts(questions){
    let pts=PTS.checkin;
    Object.values(questions).forEach(q=>{const a=(q.answers||{})[me.id];
      if(a){if((q.kind||'q')==='exit'){pts+=PTS.exit;}else{pts+=PTS.answer;if(a.intime)pts+=PTS.intime;}}});
    if(activeQ&&activeQ.answers&&activeQ.answers[me.id]){const a=activeQ.answers[me.id];
      if((activeQ.kind||'q')==='exit')pts+=PTS.exit;else{pts+=PTS.answer;if(a.intime)pts+=PTS.intime;}}
    const e=$('#my_pts');if(e)e.textContent='參與分 '+pts;
  }

  function drawQ(){
    const box=$('#s_qbox');
    if(!activeQ){box.innerHTML='';box.appendChild(el('div',{class:'card',style:'text-align:center'},
      el('div',{style:'font-size:40px'},'⏳'), el('h2',{},'等待老師提問'),
      el('div',{class:'muted small'},'保持專注，問題出現時會限時搶答喔！'))); box.__qstart=null; return;}

    const isExit=(activeQ.kind||'q')==='exit';
    const remain=Math.max(0,Math.ceil((activeQ.endAt-now())/1000));
    const total=activeQ.seconds||1;
    const ended=!isExit && remain<=0;
    const cls=ended?'end':(remain<=Math.max(3,total*0.25)?'low':'run');
    const mine=activeQ.answers&&activeQ.answers[me.id];

    if(box.__qstart!==activeQ.startAt){
      box.__qstart=activeQ.startAt;
      box.innerHTML='';
      const card=el('div',{class:'card'}, el('h2',{}, (isExit?'🎫 ':'')+activeQ.text));
      if(!isExit){card.appendChild(el('div',{class:'timer '+cls,id:'s_timer'}, remain+' 秒'));
        card.appendChild(el('div',{class:'bar'}, el('i',{id:'s_barfill',style:'width:100%'})));}
      card.appendChild(el('div',{style:'height:14px'}));
      card.appendChild(el('div',{id:'s_inputzone'}));
      box.appendChild(card);
      buildInput();
    }
    if(!isExit){const t=$('#s_timer');if(t){t.textContent=ended?'時間到':remain+' 秒';t.className='timer '+cls;}
      const bf=$('#s_barfill');if(bf)bf.style.width=(remain/total*100)+'%';
      if(ended)buildInput(); // 截止時鎖定
    }

    function buildInput(){
      const zone=$('#s_inputzone');if(!zone)return;
      const submitted=activeQ.answers&&activeQ.answers[me.id];
      if(ended && !submitted){
        zone.innerHTML='';zone.appendChild(el('div',{style:'text-align:center'},
          el('div',{style:'font-size:36px'},'⌛'), el('h3',{style:'color:var(--bad)'},'時間已截止'),
          el('div',{class:'muted small'},'下一題加油！'))); return;}
      zone.innerHTML='';
      // 已送出狀態（仍可在截止前修改）
      if(submitted){
        const a=activeQ.answers[me.id];
        zone.appendChild(el('div',{style:'text-align:center;margin-bottom:10px'},
          el('div',{style:'font-size:30px'},'✅'),
          el('h3',{style:'color:var(--ok)'}, isExit?'已送出回饋！':'已送出！'),
          el('div',{class:'answer-card'}, el('div',{class:'txt'}, (a&&a.answer)||'(空白)'),
            el('div',{class:'meta'}, isExit?'感謝回饋':((a&&a.intime)?'限時內完成':'逾時送出')))));
        if(!ended && !isExit)zone.appendChild(el('button',{class:'ghost',onclick:()=>showForm(a&&a.answer)},'✎ 修改答案（截止前可改）'));
        return;
      }
      showForm('');
    }
    function showForm(prefill){
      const zone=$('#s_inputzone');zone.innerHTML='';
      if(activeQ.type==='choice'){
        const g=el('div',{class:'row',style:'flex-wrap:wrap'});
        ['A','B','C','D'].forEach(opt=>g.appendChild(el('button',{class:'ghost',onclick:()=>submit(opt)},opt)));
        zone.appendChild(g);
      }else{
        const ti=el(activeQ.type==='number'?'input':'textarea',
          activeQ.type==='number'?{id:'s_ans',type:'number',inputmode:'decimal',placeholder:'輸入數字',value:prefill||''}
                                  :{id:'s_ans',placeholder:'輸入你的答案…'});
        if(activeQ.type!=='number'&&prefill)ti.value=prefill;
        zone.appendChild(el('div',{}, ti, el('div',{style:'height:10px'}),
          el('button',{onclick:()=>submit($('#s_ans').value)}, isExit?'送出回饋':'送出答案')));
      }
    }
    async function submit(val){
      if(!isExit && now()>activeQ.endAt){toast('時間已截止');buildInput();return;}
      const intime=isExit?true:(now()<=activeQ.endAt);
      await DB.set('sessions/'+code+'/activeQuestion/answers/'+me.id,
        {name:me.name,answer:(val==null?'':String(val)).slice(0,500),ts:now(),intime});
      toast(isExit?'已送出回饋，謝謝！':(intime?'已送出，限時內完成！':'已送出（逾時）'));
      buildInput();
    }
  }
}
